name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".changeset/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".changeset/**"
  schedule:
    - cron: "30 1 * * 0"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v4
