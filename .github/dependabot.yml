version: 2
updates:
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    # Ignore Node major bumps. Dependabot opens majors indiscriminately
    # (e.g. PR #1736 proposed Node 25, a non-LTS release). Manifest
    # tracks Node LTS only and picks the next LTS major manually
    # (currently Node 24, next Node 26 in October 2026). Digest and
    # minor/patch bumps still flow through automatically.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gcr.io/distroless/nodejs*"
        update-types: ["version-update:semver-major"]

  # npm workspaces — Dependabot reads root package.json + every workspace
  # package.json automatically. Weekly schedule keeps PR volume manageable.
  # Majors are surfaced individually so we can review breaking changes;
  # patches/minors are grouped to reduce review overhead.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        applies-to: version-updates
        update-types:
          - patch
          - minor
      security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Pinned to match the runtime Node version (CLAUDE.md: Node 24.x).
      # Bump @types/node manually when we move to a new Node LTS.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
