# First boot: `docker compose up -d` starts the stack. Visit
# http://localhost:2099 and the app walks you through creating the first
# admin account via the setup wizard at /setup. No hardcoded credentials.
#
# Configuration comes from a `.env` file next to this compose file.
# Copy `.env.example` to `.env` and set at least BETTER_AUTH_SECRET before
# booting. The install script does this automatically.
#
# Connecting local LLM servers (Ollama, vLLM, LM Studio, llama.cpp, …):
# Install your server on the host, bind it to 0.0.0.0, and point Manifest
# at `http://host.docker.internal:<port>/v1`. Manifest auto-allows private
# and http URLs in the self-hosted version. See DOCKER_README.md for the
# full flow — no `--profile` flag is needed. Requires Docker Engine 20.10+.
#
# Before exposing this instance beyond localhost:
#   - Set a real BETTER_AUTH_SECRET in .env (openssl rand -hex 32).
#   - To harden the database password, set BOTH `POSTGRES_PASSWORD` AND
#     `DATABASE_URL` in .env. They must agree — the password in the URL
#     must match POSTGRES_PASSWORD, and any special characters must be
#     percent-encoded in the URL.
#   - Confirm your admin password is strong (the setup wizard enforces
#     at least 8 characters).
#   - If you enable email verification (set EMAIL_PROVIDER / EMAIL_API_KEY),
#     set BETTER_AUTH_URL to a reachable public URL so the verification
#     links resolve.
#   - The app port binds to 127.0.0.1 by default. To expose on the LAN,
#     change `127.0.0.1:${PORT:-2099}:${PORT:-2099}` below to
#     `${PORT:-2099}:${PORT:-2099}` AND update BETTER_AUTH_URL in .env to
#     match the host you reach it on.
#
# Staying on the legacy 3001 port (existing installs):
#   Set `PORT=3001` in `.env`. Everything below reads `${PORT:-2099}`, so
#   the compose file honours it without further edits.

# Pin the Compose project name so containers, networks, and volumes have
# stable, predictable names regardless of the install directory's
# basename. Without this, the project name would be inherited from the
# directory (commonly `manifest`) and would silently collide with any
# other Docker project the user happens to have called `manifest` —
# including older Manifest installs moved to a different path.
name: mnfst

services:
  manifest:
    image: manifestdotbuild/manifest:latest
    ports:
      - "127.0.0.1:${PORT:-2099}:${PORT:-2099}"
    # Lets the container reach LLM servers running on the host (Ollama,
    # vLLM, LM Studio, llama.cpp, …) at host.docker.internal:<port>.
    # Requires Docker Engine 20.10+ (Docker Desktop works out of the box).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Default to 2099 (the current dashboard port). Existing installs can
      # pin PORT=3001 in .env to stay on the previous port without having
      # to reconfigure reverse proxies, OAuth callbacks, or bookmarks.
      - PORT=${PORT:-2099}
      - DATABASE_URL=${DATABASE_URL:-postgresql://manifest:manifest@postgres:5432/manifest}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set in .env}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:${PORT:-2099}}
      # Defaults to the host-installed Ollama. Override in .env if your
      # Ollama runs elsewhere (e.g. on another host on your LAN).
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - SEED_DATA=false
      - NODE_ENV=production
      # Email provider (optional). Covers both login/verification emails
      # and threshold alert notifications. Set one provider block — see
      # DOCKER_README.md "Email setup". Supports resend, mailgun, sendgrid.
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-}
      - EMAIL_API_KEY=${EMAIL_API_KEY:-}
      - EMAIL_DOMAIN=${EMAIL_DOMAIN:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      # OAuth providers (optional). Activate when both ID and SECRET are set.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      # Anonymous usage telemetry (opt-out). Set to 1 to disable. See
      # https://manifest.build/telemetry for the exact payload shape.
      - MANIFEST_TELEMETRY_DISABLED=${MANIFEST_TELEMETRY_DISABLED:-0}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "const p=process.env.PORT||'2099';fetch(`http://127.0.0.1:$${p}/api/v1/health`).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      # Cold first-pull with migrations + pricing-cache warmup comfortably
      # runs past 60s. A 90s grace keeps Docker from flipping the container
      # to `unhealthy` (and tripping `depends_on: service_healthy`) while
      # the app is still legitimately booting.
      start_period: 90s
      retries: 3
    # Cap container logs at ~50 MB (5 × 10 MB) so a long-running install
    # can't fill the host disk via Docker's default unbounded json-file
    # driver. Rotated logs are still retrievable via `docker logs`.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 512
    networks:
      - internal
      - frontend

  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      - POSTGRES_USER=manifest
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-manifest}
      - POSTGRES_DB=manifest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U manifest
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  # Pin the volume name so existing installs (whose project name was
  # inherited from the `manifest` directory basename) keep seeing their
  # historical `manifest_pgdata` volume after we set an explicit
  # `name: mnfst` project name above. Without this pin, renaming the
  # project would orphan the old volume and the new stack would come up
  # against a fresh empty DB — i.e. data loss.
  pgdata:
    name: manifest_pgdata
