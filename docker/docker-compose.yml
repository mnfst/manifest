services:
  manifest:
    image: manifestdotbuild/manifest:latest
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://manifest:manifest@postgres:5432/manifest
      - BETTER_AUTH_SECRET=change-me-to-a-random-32-char-string!!
      - BETTER_AUTH_URL=http://localhost:3001
      - SEED_DATA=true
      - NODE_ENV=development
      - MANIFEST_TRUST_LAN=true
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 256
    networks:
      - internal
      - frontend

  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      - POSTGRES_USER=manifest
      - POSTGRES_PASSWORD=manifest
      - POSTGRES_DB=manifest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U manifest
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  pgdata:
