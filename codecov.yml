codecov:
  branch: main
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        # Coverage is reported on every PR but does not block merges.
        informational: true
    patch:
      default:
        target: auto
        threshold: 5%
        # Coverage is reported on every PR but does not block merges.
        informational: true
flags:
  backend:
    paths:
      - packages/backend/src/
  frontend:
    paths:
      - packages/frontend/src/
  shared:
    paths:
      - packages/shared/src/
bundle_analysis:
  warning_threshold: "5%"
  status: "informational"
comment:
  layout: "reach,diff,flags"
  require_bundle_changes: true
  bundle_change_threshold: "1Kb"
