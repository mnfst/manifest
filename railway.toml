[build]
buildCommand = "npx turbo build --filter=manifest-backend --filter=manifest-frontend --filter=manifest-shared"

[deploy]
startCommand = "npm start"
# Run migrations once, before any replica starts, over the direct (non-PgBouncer)
# connection. Railway runs preDeploy in a single one-off container per deployment,
# so replicas never migrate concurrently on boot. migrate.js also holds an advisory
# lock, so overlapping deployments serialize instead of deadlocking on agent_messages.
preDeployCommand = "npm run migration:run:prod --workspace=packages/backend"
# Historical request regrouping is intentionally not part of pre-deploy or API
# readiness. The backend starts a non-blocking worker over the direct
# MIGRATION_DATABASE_URL (or BACKFILL_DATABASE_URL) and catches up legacy writes
# after the previous deployment drains. Before the first rollout, operators can
# pre-group history without waiting for the live-write delta:
# npm run backfill:requests:prod --workspace=packages/backend -- --initial-only
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
# Zero-downtime rolling deploys. The new deployment runs alongside the old one
# for `overlapSeconds` (edge shifts traffic over) before the old replica is sent
# SIGTERM. `drainingSeconds` is the SIGTERM→SIGKILL grace; it MUST exceed the
# app's own drain window (SHUTDOWN_DRAIN_MS, default 10s — the server keeps
# serving and reports 503 on /api/v1/health so the edge deregisters it) plus a
# margin for in-flight requests to finish, or the drain gets cut short.
overlapSeconds = 20
drainingSeconds = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
